# Ravendr v2 — voice-first research demo on
#   AssemblyAI (voice) · Render (compute + DB) · Mastra (agents) · You.com (research)
#
# The Workflow service (ravendr-tasks) is created manually in the Render
# dashboard — Blueprint support for the workflow service type is evolving.
# Its slug must match WORKFLOW_SLUG below and it runs `npm run start:tasks`.

previews:
  generation: automatic

services:
  - type: web
    name: ravendr-web
    runtime: node
    plan: starter
    healthCheckPath: /health
    buildCommand: npm ci && npm run build
    startCommand: node dist/server.js
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: WORKFLOW_SLUG
        displayName: Workflow slug
        description: "Slug of your Render Workflow service (defaults to ravendr-tasks)."
        value: ravendr-tasks
      - key: RENDER_REGION
        value: oregon
      - key: DATABASE_URL
        fromDatabase:
          name: ravendr-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        displayName: Anthropic API key
        description: "sk-ant-... from https://console.anthropic.com/"
        sensitive: true
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: YOUCOM_API_KEY
        displayName: You.com API key
        description: "From https://you.com/platform"
        sensitive: true
        sync: false
      - key: YOUCOM_BASE_URL
        value: https://api.you.com/v1
      - key: ASSEMBLYAI_API_KEY
        displayName: AssemblyAI API key
        description: "From https://www.assemblyai.com/app"
        sensitive: true
        sync: false
      - key: ASSEMBLYAI_AGENT_URL
        value: wss://agents.assemblyai.com/v1/realtime
      - key: ASSEMBLYAI_VOICE
        value: claire
      - key: RENDER_API_KEY
        displayName: Render API key
        description: "Used to dispatch workflow tasks. From https://dashboard.render.com/settings/api-keys"
        sensitive: true
        sync: false
      - key: LOG_LEVEL
        value: info

databases:
  - name: ravendr-db
    plan: basic-256mb
    postgresMajorVersion: "16"
